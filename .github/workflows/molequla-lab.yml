name: Molequla Lab

on:
  push:
    paths:
      - '.github/workflows/molequla-lab.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/molequla
        path: molequla-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev gcc

    - name: Build
      working-directory: molequla-src
      run: CGO_ENABLED=1 go build -o molequla . && ls -lh molequla

    - name: Evolve (all sequential — no SQLITE_BUSY)
      working-directory: molequla-src
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        RUN_DIR="../molequla-lab/runs/${DATESTAMP}"
        mkdir -p "${RUN_DIR}"
        DURATION=15
        for elem in earth air water fire; do
          echo "=== ${elem} ==="
          timeout $((DURATION * 60)) ./molequla --element $elem --evolution > "${RUN_DIR}/${elem}.log" 2>&1 || true
          sync
          echo "${elem} done: $(wc -l < ${RUN_DIR}/${elem}.log) lines"
        done
        echo "All 4 elements evolved."

    - name: Write to cauldron (clean output only)
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        mkdir -p cascade/cauldron
        CAULDRON="cascade/cauldron/${DATESTAMP}.md"
        echo "# Cascade - ${DATESTAMP}" > "$CAULDRON"
        echo "" >> "$CAULDRON"
        echo "## molequla (03:00 UTC)" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        RUN_DIR="molequla-lab/runs/${DATESTAMP}"
        for elem in earth air water fire; do
          if [ -f "${RUN_DIR}/${elem}.log" ]; then
            LINES=$(wc -l < "${RUN_DIR}/${elem}.log")
            echo "**${elem}** (${LINES} lines):" >> "$CAULDRON"
            # Clean output: skip log markers, keep generated text
            grep -v '^\[' "${RUN_DIR}/${elem}.log" | grep -v '^fatal:' | grep -v '^$' | tail -5 >> "$CAULDRON"
            echo "" >> "$CAULDRON"
          fi
        done

    - name: Push
      run: |
        git config user.name "Molequla Lab"
        git config user.email "lab@ariannamethod.org"
        git add molequla-lab/ cascade/ || true
        git diff --cached --quiet || git commit -m "lab: $(date -u +%Y-%m-%d)" && git push || true
