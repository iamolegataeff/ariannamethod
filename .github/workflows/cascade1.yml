name: "Cascade 1"

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch:

jobs:
  cascade:
    runs-on: ubuntu-latest
    timeout-minutes: 160
    permissions:
      contents: write
      issues: write
      actions: read
    steps:
    - uses: actions/checkout@v4

    - name: Set date
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV
        echo "C1=cascade/cascade1" >> $GITHUB_ENV
        echo "═══ Cascade 1: ${DATESTAMP} ═══"

    # ── 1. SEED ──────────────────────────────────────────────

    - name: Prepare seed
      run: |
        mkdir -p "$C1/seed"
        YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d 2>/dev/null || echo "")
        if [ -f "$C1/seed/${DATESTAMP}.txt" ] && [ -s "$C1/seed/${DATESTAMP}.txt" ]; then
          echo "manual seed found"
        else
          SEED=""
          if [ -n "$YESTERDAY" ]; then
            NJ=$(cat "$C1/nanojanus-lab/${YESTERDAY}.txt" 2>/dev/null || echo "")
            PEN=$(cat "$C1/penelope-lab/${YESTERDAY}.txt" 2>/dev/null || echo "")
            [ -n "$NJ" ] || [ -n "$PEN" ] && SEED="${NJ} ${PEN}"
          fi
          [ -z "$(echo $SEED | tr -d ' ')" ] && SEED=$(cat "$C1/genesis.txt" 2>/dev/null || echo "resonance emergence field")
          echo "$SEED" > "$C1/seed/${DATESTAMP}.txt"
        fi
        echo "seed: $(cat $C1/seed/${DATESTAMP}.txt | head -1 | cut -c1-80)"

    # ── 2. HAIKU ─────────────────────────────────────────────

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/haiku.c
        path: haiku-src

    - name: Haiku
      id: haiku
      continue-on-error: true
      run: |
        mkdir -p "$C1/haiku-lab"
        cc haiku-src/haiku.c -O2 -lm -o haiku 2>/dev/null
        if [ ! -f haiku ]; then echo "haiku: build failed" >> "$C1/cascade_errors.txt"; exit 0; fi
        SEED=$(cat "$C1/seed/${DATESTAMP}.txt")
        RAW=$(echo "$SEED" | ./haiku 2>&1 || true)
        HAIKU=$(echo "$RAW" | sed -n '/d=.*T=/,/debt=/p' | grep -v 'd=' | grep -v 'debt=' | grep -v '^$' | sed 's/^  //' | head -3)
        [ -z "$HAIKU" ] && HAIKU=$(echo "$RAW" | grep '^  [a-z]' | head -3 | sed 's/^  //')
        [ -z "$HAIKU" ] && HAIKU="silence between the wires"
        echo "$HAIKU" > "$C1/haiku-lab/${DATESTAMP}.txt"
        echo "haiku: $(cat $C1/haiku-lab/${DATESTAMP}.txt | head -1)"

    # ── 3. PENELOPE ──────────────────────────────────────────

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/1984
        path: penelope-src

    - name: Penelope
      id: penelope
      continue-on-error: true
      run: |
        mkdir -p "$C1/penelope-lab"
        HAIKU=$(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null | tr '\n' ' ')
        [ -z "$(echo $HAIKU | tr -d ' ')" ] && HAIKU=$(cat "$C1/seed/${DATESTAMP}.txt")
        python3 penelope-src/penelope.py --load penelope-src/weights/penelope.bin "$HAIKU" \
          > /tmp/pen_stdout.txt 2>/tmp/pen_stderr.txt || true
        cat /tmp/pen_stderr.txt /tmp/pen_stdout.txt > "$C1/penelope-lab/${DATESTAMP}_raw.txt"
        WORDS=$(cat /tmp/pen_stdout.txt \
          | grep -oE '\b[a-z]{3,}\b' \
          | grep -vE '^(debt|destined|drift|extended|loaded|mode|vocab|penelope|params|trained|hardcoded|words)' \
          | head -12 | tr '\n' ' ')
        [ -z "$WORDS" ] && WORDS="silence between forms"
        echo "$WORDS" > "$C1/penelope-lab/${DATESTAMP}.txt"
        echo "penelope: $WORDS"

    # ── 4. MOLEQULA ──────────────────────────────────────────

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/molequla
        path: molequla-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Molequla
      id: molequla
      continue-on-error: true
      run: |
        RUN_DIR="$C1/molequla-lab/${DATESTAMP}"
        mkdir -p "$RUN_DIR"
        cd molequla-src
        sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev gcc 2>/dev/null || true
        CGO_ENABLED=1 go build -o molequla . 2>/dev/null
        if [ ! -f molequla ]; then echo "molequla: build failed" >> "../$C1/cascade_errors.txt"; cd ..; exit 0; fi
        for elem in earth air water fire; do
          timeout 1800 ./molequla --element $elem --evolution > "../${RUN_DIR}/${elem}.log" 2>&1 || true
          echo "${elem}: $(wc -l < ../${RUN_DIR}/${elem}.log 2>/dev/null || echo 0) lines"
        done
        cd ..
        for elem in earth air water fire; do
          [ -f "${RUN_DIR}/${elem}.log" ] && grep -v '^\[' "${RUN_DIR}/${elem}.log" | grep -v '^fatal:' | grep -v '^$' | tail -3
        done > "${RUN_DIR}/clean_output.txt"
        echo "molequla: $(wc -l < ${RUN_DIR}/clean_output.txt 2>/dev/null || echo 0) clean lines"

    # ── 5. NANOJANUS ─────────────────────────────────────────

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/janus
        path: janus-src

    - name: NanoJanus
      id: nanojanus
      continue-on-error: true
      run: |
        mkdir -p "$C1/nanojanus-lab"
        HAIKU=$(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null | tr '\n' ' ')
        PENELOPE=$(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null)
        MOLEQULA=$(cat "$C1/molequla-lab/${DATESTAMP}/clean_output.txt" 2>/dev/null | head -5 | tr '\n' ' ')
        INPUT="${HAIKU} ${PENELOPE} ${MOLEQULA}"
        INPUT=$(echo "$INPUT" | sed 's/^[[:space:]]*//' | cut -c1-500)
        [ -z "$(echo $INPUT | tr -d ' ')" ] && INPUT=$(cat "$C1/genesis.txt" 2>/dev/null || echo "resonance emergence field")
        echo "nanojanus input: $(echo $INPUT | cut -c1-80)..."
        cc janus-src/nanojanus.c -O2 -lm -o nanojanus 2>/dev/null
        if [ ! -f nanojanus ]; then echo "nanojanus: build failed" >> "$C1/cascade_errors.txt"; exit 0; fi
        ./nanojanus --weights janus-src/weights/nanojanus.bin --vocab janus-src/nanojanus.txt \
          --generate "$INPUT" > /tmp/nj_stdout.txt 2>/tmp/nj_stderr.txt || true
        cat /tmp/nj_stderr.txt /tmp/nj_stdout.txt > "$C1/nanojanus-lab/${DATESTAMP}_raw.txt"
        WORDS=$(cat /tmp/nj_stdout.txt | grep -E '^\s+[\^v]' | awk '{print $2}' | head -12 | tr '\n' ' ')
        [ -z "$WORDS" ] && WORDS=$(cat /tmp/nj_stdout.txt \
          | grep -oE '\b[a-z]{3,}\b' \
          | grep -vE '^(debt|drift|params|extended|vocab|loaded|weights|resonance|engine|trained|hardcoded|words|format)' \
          | head -12 | tr '\n' ' ')
        [ -z "$WORDS" ] && WORDS="silence"
        echo "$WORDS" > "$C1/nanojanus-lab/${DATESTAMP}.txt"
        echo "nanojanus: $WORDS"

    # ── 6. REPORT ────────────────────────────────────────────

    - name: Daily report
      run: |
        mkdir -p "$C1/daily"
        REPORT="$C1/daily/${DATESTAMP}.md"
        ERRORS=""
        [ -f "$C1/cascade_errors.txt" ] && ERRORS=$(cat "$C1/cascade_errors.txt")

        cat > "$REPORT" << REOF
        # Cascade 1 — ${DATESTAMP}

        ## Seed
        $(cat "$C1/seed/${DATESTAMP}.txt" 2>/dev/null | head -3)

        ## Haiku
        $(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(failed)")

        ## Penelope
        $(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(failed)")

        ## Molequla
        $(for elem in earth air water fire; do
          LOG="$C1/molequla-lab/${DATESTAMP}/${elem}.log"
          [ -f "$LOG" ] && echo "- ${elem}: $(wc -l < $LOG) lines" || echo "- ${elem}: (no data)"
        done)

        ## NanoJanus
        $(cat "$C1/nanojanus-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(failed)")

        ## Errors
        ${ERRORS:-none}
        REOF

        # Update cascade.md
        if ! grep -q "## ${DATESTAMP}" "$C1/cascade.md" 2>/dev/null; then
          {
            echo ""; echo "---"; echo ""
            echo "## ${DATESTAMP}"
            echo "**seed:** $(cat $C1/seed/${DATESTAMP}.txt 2>/dev/null | head -1 | cut -c1-200)"
            echo "**haiku:** $(cat $C1/haiku-lab/${DATESTAMP}.txt 2>/dev/null | head -1)"
            echo "**penelope:** $(cat $C1/penelope-lab/${DATESTAMP}.txt 2>/dev/null)"
            echo "**nanojanus:** $(cat $C1/nanojanus-lab/${DATESTAMP}.txt 2>/dev/null)"
            echo "**errors:** ${ERRORS:-none}"
          } >> "$C1/cascade.md"
        fi

        rm -f "$C1/cascade_errors.txt"

    # ── 7. PUSH ──────────────────────────────────────────────

    - name: Push
      run: |
        git config user.name "Cascade 1"
        git config user.email "cascade@ariannamethod.org"
        git add cascade/cascade1/ || true
        git diff --cached --quiet || git commit -m "cascade1: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
        echo "═══ Cascade 1 complete: ${DATESTAMP} ═══"

    # ── 8. COPILOT GUARDS ─────────────────────────────────────

    - name: Deploy Copilot guards
      if: always()
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        HAS_PAT: ${{ secrets.PAT_TOKEN != '' }}
      run: |
        if [ "$HAS_PAT" != "true" ]; then
          echo "PAT_TOKEN not set — skipping copilot guards"
          exit 0
        fi

        # Main behavioral report issue
        cat > /tmp/guard_body.md << GEOF
        ## Cascade 1 Guard Report — ${DATESTAMP}

        Review today's cascade output. Read \`.github/copilot-instructions.md\`.
        Write report to \`cascade/cascade1/reports/${DATESTAMP}-guard.md\`.

        **Seed:** $(cat "$C1/seed/${DATESTAMP}.txt" 2>/dev/null | head -1 | cut -c1-200)
        **Haiku:** $(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null | head -1)
        **Penelope:** $(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null)
        **NanoJanus:** $(cat "$C1/nanojanus-lab/${DATESTAMP}.txt" 2>/dev/null)
        **Molequla:** $(wc -l "$C1/molequla-lab/${DATESTAMP}/"*.log 2>/dev/null | tail -1 || echo "no data")
        **Errors:** $(cat "$C1/cascade_errors.txt" 2>/dev/null || echo "none")

        Create a PR with the report file.
        GEOF

        ISSUE_URL=$(gh issue create --repo ariannamethod/ariannamethod \
          --title "Guard Report: Cascade 1 — ${DATESTAMP}" \
          --body-file /tmp/guard_body.md \
          --label "copilot" 2>&1 || true)
        echo "guard issue: $ISSUE_URL"
        ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
        [ -n "$ISSUE_NUM" ] && gh api "repos/ariannamethod/ariannamethod/issues/${ISSUE_NUM}/assignees" \
          -X POST --input - <<< '{"assignees":["copilot"]}' > /dev/null 2>&1 || true

        # Per-organism guard issues
        for ORG_REPO in "haiku.c" "1984" "molequla" "janus"; do
          ORG_NAME=$(echo $ORG_REPO | sed 's/\.c$//' | sed 's/1984/penelope/' | sed 's/janus/nanojanus/')
          gh issue create --repo "ariannamethod/${ORG_REPO}" \
            --title "Guard: ${ORG_NAME} — ${DATESTAMP}" \
            --body "Review ${ORG_NAME} output for ${DATESTAMP}. Check labs/ and write report to labs/${DATESTAMP}-guard.md. Create PR." \
            --label "copilot" 2>&1 || true
        done
        echo "copilot guards deployed"

    # ── 9. WATCHDOG ──────────────────────────────────────────

    - name: Watchdog
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh issue create \
          --title "Cascade 1 FAILED: ${DATESTAMP}" \
          --body "Cascade 1 failed on ${DATESTAMP}. Check the [workflow run](https://github.com/ariannamethod/ariannamethod/actions)." \
          --label "cascade-alert" || true
