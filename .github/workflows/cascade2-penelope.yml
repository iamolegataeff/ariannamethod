name: cascade2 — penelope

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

concurrency:
  group: cascade2-penelope
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  penelope:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Guard PAT_TOKEN
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::PAT_TOKEN missing"
            exit 1
          fi

      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Compute date
        id: d
        run: echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch upstream (haiku output, fallback to seed)
        id: upstream
        run: |
          TODAY="${{ steps.d.outputs.today }}"
          HAIKU="cascade/cascade2/haiku-lab/$TODAY/output.txt"
          if [ -f "$HAIKU" ]; then
            SEED="$(cat "$HAIKU")"
          elif [ -f "cascade/cascade2/seed/today.txt" ]; then
            SEED="$(cat cascade/cascade2/seed/today.txt)"
          elif [ -f "cascade/cascade2/genesis.txt" ]; then
            SEED="$(cat cascade/cascade2/genesis.txt)"
          else
            SEED="pressure came first, pressure made motion"
          fi
          {
            echo "seed<<EOF"
            echo "$SEED"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Clone penelope (1984)
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ariannamethod/1984.git /tmp/penelope

      - name: Run penelope (python version, 12-word chain)
        run: |
          cd /tmp/penelope
          python3 penelope.py --load weights/penelope.bin "${{ steps.upstream.outputs.seed }}" > /tmp/penelope_raw.txt 2>&1 || true
          echo "--- penelope output (last 40 lines) ---"
          tail -40 /tmp/penelope_raw.txt

      - name: Commit output to penelope-lab
        run: |
          DAY_DIR="cascade/cascade2/penelope-lab/${{ steps.d.outputs.today }}"
          mkdir -p "$DAY_DIR"
          cp /tmp/penelope_raw.txt "$DAY_DIR/output.txt"
          printf "%s\n" "${{ steps.upstream.outputs.seed }}" > "$DAY_DIR/seed.txt"
          git config user.email "cascade@ariannamethod.ai"
          git config user.name  "cascade-bot"
          git add "$DAY_DIR"
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "cascade2/penelope: ${{ steps.d.outputs.today }}"
          git pull --rebase origin main || true
          git push

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh issue create \
            --repo ariannamethod/ariannamethod \
            --title "cascade-alert: penelope ${{ steps.d.outputs.today }}" \
            --label "cascade-alert" \
            --body "Penelope step of cascade2 failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
