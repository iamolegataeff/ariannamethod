name: cascade2 — haiku

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: cascade2-haiku
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  haiku:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Guard PAT_TOKEN
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::PAT_TOKEN missing in repo secrets"
            exit 1
          fi

      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Compute date
        id: d
        run: echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Fetch seed (yesterday's nanojanus output or genesis)
        id: seed
        run: |
          SEED_FILE="cascade/cascade2/seed/today.txt"
          if [ -f "$SEED_FILE" ]; then
            SEED="$(cat "$SEED_FILE")"
          elif [ -f "cascade/cascade2/genesis.txt" ]; then
            SEED="$(cat "cascade/cascade2/genesis.txt")"
          else
            SEED="pressure came first, pressure made motion"
          fi
          {
            echo "seed<<EOF"
            echo "$SEED"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Clone & build haiku
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ariannamethod/haiku.c.git /tmp/haiku
          cd /tmp/haiku
          make

      - name: Run haiku (one round + /quit)
        run: |
          cd /tmp/haiku
          printf "%s\n/quit\n" "${{ steps.seed.outputs.seed }}" | ./haiku > /tmp/haiku_raw.txt 2>&1 || true
          echo "--- haiku output (last 40 lines) ---"
          tail -40 /tmp/haiku_raw.txt

      - name: Commit output to haiku-lab
        run: |
          DAY_DIR="cascade/cascade2/haiku-lab/${{ steps.d.outputs.today }}"
          mkdir -p "$DAY_DIR"
          cp /tmp/haiku_raw.txt "$DAY_DIR/output.txt"
          printf "%s\n" "${{ steps.seed.outputs.seed }}" > "$DAY_DIR/seed.txt"
          git config user.email "cascade@ariannamethod.ai"
          git config user.name  "cascade-bot"
          git add "$DAY_DIR"
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "cascade2/haiku: ${{ steps.d.outputs.today }}"
          git pull --rebase origin main || true
          git push

      - name: Alert on failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh issue create \
            --repo ariannamethod/ariannamethod \
            --title "cascade-alert: haiku ${{ steps.d.outputs.today }}" \
            --label "cascade-alert" \
            --body "Haiku step of cascade2 failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
