name: "Cascade 1: Daily Report"

on:
  workflow_run:
    workflows: ["Cascade 1: NanoJanus"]
    types: [completed]
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read
    steps:
    - uses: actions/checkout@v4

    - name: Generate daily report
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        C1="cascade/cascade1"
        mkdir -p "$C1/daily"
        REPORT="$C1/daily/${DATESTAMP}.md"

        # Collect data
        SEED=$(cat "$C1/seed/${DATESTAMP}.txt" 2>/dev/null | head -3 || echo "(no seed)")
        HAIKU=$(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(no haiku)")
        PENELOPE=$(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(no output)")
        PENELOPE_RAW=$(cat "$C1/penelope-lab/${DATESTAMP}_raw.txt" 2>/dev/null | head -30 || echo "(no raw)")
        NANOJANUS=$(cat "$C1/nanojanus-lab/${DATESTAMP}.txt" 2>/dev/null || echo "(no output)")
        NANOJANUS_RAW=$(cat "$C1/nanojanus-lab/${DATESTAMP}_raw.txt" 2>/dev/null | head -40 || echo "(no raw)")

        PEN_WORDS=$(echo "$PENELOPE" | wc -w | tr -d ' ')
        NJ_WORDS=$(echo "$NANOJANUS" | wc -w | tr -d ' ')

        # Molequla per-element summary
        MOL_TOTAL=0
        MOL_LINES=""
        if [ -d "$C1/molequla-lab/${DATESTAMP}" ]; then
          for elem in earth air water fire; do
            LOG="$C1/molequla-lab/${DATESTAMP}/${elem}.log"
            if [ -f "$LOG" ]; then
              LINES=$(wc -l < "$LOG" | tr -d ' ')
              MOL_TOTAL=$((MOL_TOTAL + LINES))
              SNIPPET=$(grep -v '^\[debug\]' "$LOG" | grep -v '^$' | grep -v 'Ctrl+C' | tail -5)
              MOL_LINES="${MOL_LINES}${elem} (${LINES} lines): $(echo "$SNIPPET" | head -2 | tr '\n' ' ')
        "
            fi
          done
        fi

        # === Vocabulary quality metrics ===
        BPE_FRAGS="ough|ital|ard|ently|cre|ely|ary|ily|ith|ying|ald|ond|und|ung"

        # Penelope metrics
        PEN_REAL=0; PEN_FRAG=0; PEN_DEBUG=0
        for w in $PENELOPE; do
          if echo "$w" | grep -qE "^(extended|penelope|by|loaded|mode:?|vocab|params|trained|hardcoded|words)$"; then
            PEN_DEBUG=$((PEN_DEBUG + 1))
          elif echo "$w" | grep -qE "^($BPE_FRAGS)$"; then
            PEN_FRAG=$((PEN_FRAG + 1))
          else
            PEN_REAL=$((PEN_REAL + 1))
          fi
        done

        # NanoJanus metrics
        NJ_REAL=0; NJ_FRAG=0
        for w in $NANOJANUS; do
          if echo "$w" | grep -qE "^($BPE_FRAGS)$"; then
            NJ_FRAG=$((NJ_FRAG + 1))
          else
            NJ_REAL=$((NJ_REAL + 1))
          fi
        done

        # Seed purity
        SEED_CLEAN=0; SEED_DEBUG=0; SEED_TOTAL=0
        for w in $SEED; do
          SEED_TOTAL=$((SEED_TOTAL + 1))
          if echo "$w" | grep -qE "^(extended|penelope|by|loaded|mode:?|vocab|params|trained|hardcoded|words)$"; then
            SEED_DEBUG=$((SEED_DEBUG + 1))
          else
            SEED_CLEAN=$((SEED_CLEAN + 1))
          fi
        done

        # Haiku stop-word ratio
        HAIKU_STOPS=0; HAIKU_TOTAL=0
        STOP_WORDS="i|me|my|we|our|you|your|he|she|it|they|them|the|a|an|and|or|but|in|on|at|to|for|of|is|am|are|was|were|be|been|being|have|has|had|do|does|did|will|would|shall|should|can|could|may|might|must|not|no|nor|so|if|then|than|that|this|what|which|who|whom|how|when|where|why|up|out|just|get|go|about|know|said|yes|him"
        for w in $(echo "$HAIKU" | tr '\n' ' '); do
          HAIKU_TOTAL=$((HAIKU_TOTAL + 1))
          echo "$w" | grep -qiE "^($STOP_WORDS)$" && HAIKU_STOPS=$((HAIKU_STOPS + 1))
        done

        # Workflow statuses
        WF_INFO=""
        for WF in cascade1-haiku cascade1-penelope cascade1-molequla cascade1-nanojanus; do
          STATUS=$(gh run list --workflow="${WF}.yml" --limit=1 --json conclusion,createdAt \
            --jq '.[0] | "\(.conclusion) \(.createdAt)"' 2>/dev/null || echo "unknown")
          WF_INFO="${WF_INFO}| ${WF} | ${STATUS} |
        "
        done

        # Write report
        {
          echo "# Cascade 1 — Daily Report: ${DATESTAMP}"
          echo ""
          echo "## Status"
          echo ""
          echo "| Organism | Status |"
          echo "|----------|--------|"
          echo "| Haiku | $([ "$HAIKU" = '(no haiku)' ] && echo 'MISSING' || echo 'OK') |"
          echo "| Penelope | OK (${PEN_WORDS} words) |"
          echo "| Molequla | ${MOL_TOTAL} lines total |"
          echo "| NanoJanus | OK (${NJ_WORDS} words) |"
          echo ""
          echo "## Workflow Runs"
          echo ""
          echo "| Workflow | Result |"
          echo "|----------|--------|"
          echo "$WF_INFO"
          echo ""
          echo "## Vocabulary Health"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Penelope: real words | ${PEN_REAL}/${PEN_WORDS} |"
          echo "| Penelope: BPE fragments | ${PEN_FRAG} |"
          echo "| Penelope: debug leaks | ${PEN_DEBUG} |"
          echo "| NanoJanus: real words | ${NJ_REAL}/${NJ_WORDS} |"
          echo "| NanoJanus: BPE fragments | ${NJ_FRAG} |"
          echo "| Seed purity | ${SEED_CLEAN}/${SEED_TOTAL} clean |"
          echo "| Seed debug leaks | ${SEED_DEBUG} |"
          echo "| Haiku stop-word ratio | ${HAIKU_STOPS}/${HAIKU_TOTAL} |"
          echo ""
          echo "---"
          echo ""
          echo "## Seed"
          echo ""
          echo "$SEED"
          echo ""
          echo "## 1. Haiku"
          echo ""
          echo "$HAIKU"
          echo ""
          echo "## 2. Penelope (12 words)"
          echo ""
          echo "**Words:** ${PENELOPE}"
          echo ""
          echo "Raw chain:"
          echo ""
          echo "$PENELOPE_RAW"
          echo ""
          echo "## 3. Molequla (4 elements, ${MOL_TOTAL} lines)"
          echo ""
          echo "$MOL_LINES"
          echo ""
          echo "## 4. NanoJanus (12 words, bidirectional)"
          echo ""
          echo "**Words:** ${NANOJANUS}"
          echo ""
          echo "Raw bidirectional chain:"
          echo ""
          echo "$NANOJANUS_RAW"
          echo ""
          echo "---"
          echo ""
          echo "## Tomorrow's Seed"
          echo ""
          echo "${NANOJANUS}  ${PENELOPE}"
          echo ""
          echo "---"
          echo "*Generated by Cascade 1 Daily Report*"
        } > "$REPORT"

        echo "=== Report written ==="
        wc -l "$REPORT"

    - name: Push
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        git config user.name "Cascade 1: Daily Report"
        git config user.email "cascade1@ariannamethod.org"
        git add cascade/cascade1/daily/ || true
        git diff --cached --quiet || git commit -m "cascade1/daily: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
