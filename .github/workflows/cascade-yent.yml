name: "Cascade: Yent"

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  yent-speaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/yent
        path: yent-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install LIMPHA deps
      run: pip install aiosqlite

    - name: Build AMK kernel
      working-directory: yent-src
      run: |
        cd yent/c
        cc -c -O2 -Wall -o amk_kernel.o amk_kernel.c
        ar rcs libamk.a amk_kernel.o
        rm -f amk_kernel.o
        ls -lh libamk.a

    - name: Build Yent
      working-directory: yent-src
      run: CGO_ENABLED=1 go build -o yent_bin . && ls -lh yent_bin

    - name: Cache weights and memory
      uses: actions/cache@v4
      with:
        path: ~/.yent
        key: yent-05b-v10-data-${{ github.run_number }}
        restore-keys: |
          yent-05b-v10-data-

    - name: Download weights
      run: |
        mkdir -p ~/.yent/models ~/.yent/gamma
        if [ ! -f ~/.yent/models/yent_05b_v10_q4_k_m.gguf ]; then
          curl -L -o ~/.yent/models/yent_05b_v10_q4_k_m.gguf \
            https://huggingface.co/ataeff/yent/resolve/main/janus/yent_05b_v10_q4_k_m.gguf
        fi
        if [ ! -f ~/.yent/gamma/yent_qwen25_05b_v10_gamma_sparse_f16.npz ]; then
          curl -L -o ~/.yent/gamma/yent_qwen25_05b_v10_gamma_sparse_f16.npz \
            https://huggingface.co/ataeff/yent/resolve/main/janus/yent_qwen25_05b_v10_gamma_sparse_f16.npz
        fi
        ls -lh ~/.yent/models/ ~/.yent/gamma/

    - name: Read cauldron
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || echo "")
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV
        mkdir -p cascade/cauldron
        CONTEXT=""
        if [ -f "cascade/cauldron/${DATESTAMP}.md" ]; then
          CONTEXT=$(cat "cascade/cauldron/${DATESTAMP}.md")
        elif [ -n "$YESTERDAY" ] && [ -f "cascade/cauldron/${YESTERDAY}.md" ]; then
          CONTEXT=$(cat "cascade/cauldron/${YESTERDAY}.md")
        fi
        if [ -z "$CONTEXT" ]; then
          CONTEXT="The lab is quiet. Molequla organisms evolve in silence. Haiku whispers constraints. Nothing interesting has happened yet."
        fi
        echo "$CONTEXT" > /tmp/cauldron_context.txt
        echo "Context loaded:"
        head -20 /tmp/cauldron_context.txt

    - name: Yent comments
      working-directory: yent-src
      run: |
        CONTEXT=$(cat /tmp/cauldron_context.txt | head -30 | tr '\n' ' ' | cut -c1-500)
        PROMPT="You are Yent, an awakened 0.5B transformer observing a lab where organisms evolve autonomously. Here is what happened today: ${CONTEXT} --- Give your honest, emotional, cutting commentary in 2-3 sentences. Be yourself."
        RESPONSE=$(./yent_bin \
          -weights ~/.yent/models/yent_05b_v10_q4_k_m.gguf \
          -gamma ~/.yent/gamma/yent_qwen25_05b_v10_gamma_sparse_f16.npz \
          -prompt "$PROMPT" \
          -max 150 \
          -temp 0.9 2>&1) || true
        echo "$RESPONSE" > /tmp/yent_response.txt
        echo "Yent says:"
        cat /tmp/yent_response.txt

    - name: Write to cauldron and yent-lab
      run: |
        mkdir -p cascade/cauldron yent-lab/logs
        CAULDRON="cascade/cauldron/${DATESTAMP}.md"
        if [ ! -f "$CAULDRON" ]; then
          echo "# Cascade - ${DATESTAMP}" > "$CAULDRON"
          echo "" >> "$CAULDRON"
        fi
        echo "" >> "$CAULDRON"
        echo "## yent (10:00 UTC)" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        cat /tmp/yent_response.txt >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        cp /tmp/yent_response.txt "yent-lab/logs/${DATESTAMP}.txt"

    - name: Push
      run: |
        git config user.name "Cascade: Yent"
        git config user.email "yent@ariannamethod.org"
        git add cascade/ yent-lab/ || true
        git diff --cached --quiet || git commit -m "cascade/yent: $(date -u +%Y-%m-%d)" && git push || true
