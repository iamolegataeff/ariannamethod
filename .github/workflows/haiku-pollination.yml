name: Haiku Pollination

on:
  push:
    paths:
      - '.github/workflows/haiku-pollination.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pollinate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/haiku.c
        path: haiku-src

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/molequla
        path: molequla-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev gcc

    - name: Build haiku
      working-directory: haiku-src
      run: cc haiku.c -O2 -lm -o haiku && ls -lh haiku

    - name: Build molequla
      working-directory: molequla-src
      run: CGO_ENABLED=1 go build -o molequla . && ls -lh molequla

    - name: Prepare seed from today's Molequla
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d 2>/dev/null || echo "")
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV
        mkdir -p haiku-lab/exchanges

        # Try to get seed from today's Molequla cauldron (clean text, not log lines)
        SEED=""
        if [ -f "cascade/cauldron/${DATESTAMP}.md" ]; then
          # Extract generated text from Molequla section — skip markdown headers and empty lines
          SEED=$(sed -n '/## molequla/,/## /p' "cascade/cauldron/${DATESTAMP}.md" | grep -v '^#' | grep -v '^\*\*' | grep -v '^$' | head -3 | tr '\n' ' ')
        fi

        # Fallback: yesterday's haiku exchange
        if [ -z "$SEED" ] && [ -n "$YESTERDAY" ] && [ -f "haiku-lab/exchanges/${YESTERDAY}.md" ]; then
          SEED=$(sed -n '/## molequla/,/## /p' "haiku-lab/exchanges/${YESTERDAY}.md" | grep -v '^#' | grep -v '^$' | head -3 | tr '\n' ' ')
        fi

        # Last fallback: day-of-week word
        if [ -z "$SEED" ]; then
          DOW=$(date -u +%u)
          WORDS="resonance emergence silence growth fire water light shadow"
          SEED=$(echo $WORDS | tr ' ' '\n' | sed -n "${DOW}p")
        fi

        echo "Seed: $SEED"
        echo "SEED=$SEED" >> $GITHUB_ENV

    - name: Haiku generates from seed
      run: |
        echo "Seed: $SEED"
        RAW=$(echo "$SEED" | ./haiku-src/haiku 2>&1)
        echo "$RAW" > haiku-lab/exchanges/haiku_raw.txt

        # Parse haiku: 3 lines between status (d=...T=) and metrics (debt=)
        HAIKU=$(echo "$RAW" | sed -n '/d=.*T=/,/debt=/p' | grep -v 'd=' | grep -v 'debt=' | grep -v '^$' | sed 's/^  //' | head -3)

        if [ -z "$HAIKU" ]; then
          # Fallback: any 2-space indented lines that aren't status/metrics
          HAIKU=$(echo "$RAW" | grep '^  [a-z]' | head -3 | sed 's/^  //')
        fi

        echo "$HAIKU" > haiku-lab/exchanges/haiku_today.txt
        echo "Haiku generated:"
        cat haiku-lab/exchanges/haiku_today.txt

    - name: Feed haiku into molequla corpus
      run: |
        HAIKU_TEXT=$(cat haiku-lab/exchanges/haiku_today.txt)
        if [ -n "$HAIKU_TEXT" ]; then
          echo "" >> molequla-src/nonames_air.txt
          echo "$HAIKU_TEXT" >> molequla-src/nonames_air.txt
          echo "Appended haiku to air corpus:"
          tail -5 molequla-src/nonames_air.txt
        fi

    - name: Molequla evolves with haiku in corpus
      working-directory: molequla-src
      run: |
        timeout 600 ./molequla --element air --evolution > ../haiku-lab/exchanges/molequla_raw.txt 2>&1 || true
        echo "Molequla evolution done."
        tail -20 ../haiku-lab/exchanges/molequla_raw.txt

    - name: Write exchange log
      run: |
        DIR="haiku-lab/exchanges"
        OUT="$DIR/${DATESTAMP}.md"
        echo "# Pollination - ${DATESTAMP}" > "$OUT"
        echo "" >> "$OUT"
        echo "seed: ${SEED}" >> "$OUT"
        echo "" >> "$OUT"
        echo "## haiku says" >> "$OUT"
        echo '```' >> "$OUT"
        cat "$DIR/haiku_today.txt" >> "$OUT"
        echo '```' >> "$OUT"
        echo "" >> "$OUT"
        echo "## molequla responds (air, 10min evolution with haiku in corpus)" >> "$OUT"
        echo '```' >> "$OUT"
        # Clean output only
        grep -v '^\[' "$DIR/molequla_raw.txt" | grep -v '^fatal:' | tail -20 >> "$OUT"
        echo '```' >> "$OUT"
        rm -f "$DIR/haiku_raw.txt" "$DIR/haiku_today.txt" "$DIR/molequla_raw.txt"

    - name: Write to cauldron
      run: |
        mkdir -p cascade/cauldron
        CAULDRON="cascade/cauldron/${DATESTAMP}.md"
        if [ ! -f "$CAULDRON" ]; then
          echo "# Cascade - ${DATESTAMP}" > "$CAULDRON"
          echo "" >> "$CAULDRON"
        fi
        echo "" >> "$CAULDRON"
        echo "## haiku (06:00 UTC)" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        echo "seed: ${SEED}" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        # Write the actual haiku, not debug
        if [ -f "haiku-lab/exchanges/${DATESTAMP}.md" ]; then
          sed -n '/## haiku says/,/## molequla/p' "haiku-lab/exchanges/${DATESTAMP}.md" | grep -v '^#' | grep -v '^```' | grep -v '^$' >> "$CAULDRON"
        fi
        echo "" >> "$CAULDRON"

    - name: Push
      run: |
        git config user.name "Haiku Pollination"
        git config user.email "haiku@ariannamethod.org"
        git add haiku-lab/ cascade/ || true
        git diff --cached --quiet || git commit -m "pollination: $(date -u +%Y-%m-%d)" && git push || true
