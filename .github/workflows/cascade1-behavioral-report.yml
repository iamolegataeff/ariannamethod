name: "Cascade 1: Behavioral Report"

on:
  schedule:
    # Every 3 days at 09:00 UTC (after daily report at 08:00)
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  behavioral-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
    - uses: actions/checkout@v4

    - name: Collect 3-day data
      id: collect
      run: |
        C1="cascade/cascade1"
        TODAY=$(date -u +%Y-%m-%d)

        # Collect last 3 days of reports
        REPORT_DATA=""
        DAYS_FOUND=0
        for i in 0 1 2; do
          DAY=$(date -u -d "$TODAY - $i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null)
          [ -z "$DAY" ] && continue

          DAILY="$C1/daily/${DAY}.md"
          SEED="$C1/seed/${DAY}.txt"
          HAIKU="$C1/haiku-lab/${DAY}.txt"
          PEN="$C1/penelope-lab/${DAY}.txt"
          PEN_RAW="$C1/penelope-lab/${DAY}_raw.txt"
          NJ="$C1/nanojanus-lab/${DAY}.txt"
          NJ_RAW="$C1/nanojanus-lab/${DAY}_raw.txt"

          if [ -f "$DAILY" ]; then
            DAYS_FOUND=$((DAYS_FOUND + 1))
            REPORT_DATA="${REPORT_DATA}
        ---
        ### Day: ${DAY}

        **Seed:**
        $(cat "$SEED" 2>/dev/null | head -3 || echo '(missing)')

        **Haiku:**
        $(cat "$HAIKU" 2>/dev/null || echo '(missing)')

        **Penelope words:** $(cat "$PEN" 2>/dev/null || echo '(missing)')

        **Penelope raw chain (last 20 lines):**
        \`\`\`
        $(cat "$PEN_RAW" 2>/dev/null | tail -20 || echo '(missing)')
        \`\`\`

        **NanoJanus words:** $(cat "$NJ" 2>/dev/null || echo '(missing)')

        **NanoJanus raw chain (last 25 lines):**
        \`\`\`
        $(cat "$NJ_RAW" 2>/dev/null | tail -25 || echo '(missing)')
        \`\`\`

        **Molequla:**
        $(if [ -d "$C1/molequla-lab/${DAY}" ]; then
          for elem in earth air water fire; do
            LOG="$C1/molequla-lab/${DAY}/${elem}.log"
            [ -f "$LOG" ] && echo "- ${elem}: $(wc -l < "$LOG") lines, last ecology: $(grep 'ecology' "$LOG" | tail -1)"
          done
        else
          echo '(no molequla data)'
        fi)
        "
          fi
        done

        if [ "$DAYS_FOUND" -eq 0 ]; then
          echo "No daily reports found for last 3 days. Exiting."
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "skip=false" >> $GITHUB_OUTPUT

        # Quick vocabulary diagnostics
        VOCAB_DIAG=""
        for i in 0 1 2; do
          DAY=$(date -u -d "$TODAY - $i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null)
          [ -z "$DAY" ] && continue

          PEN="$C1/penelope-lab/${DAY}.txt"
          NJ="$C1/nanojanus-lab/${DAY}.txt"
          SEED="$C1/seed/${DAY}.txt"

          # Count debug leaks in Penelope output
          PEN_WORDS=$(cat "$PEN" 2>/dev/null || echo "")
          PEN_DEBUG=$(echo "$PEN_WORDS" | tr ' ' '\n' | grep -cE '^(extended|penelope|by|loaded|mode:|mode)$' || echo 0)
          PEN_TOTAL=$(echo "$PEN_WORDS" | wc -w | tr -d ' ')

          # Count debug leaks in seed
          SEED_TEXT=$(cat "$SEED" 2>/dev/null || echo "")
          SEED_DEBUG=$(echo "$SEED_TEXT" | tr ' ' '\n' | grep -cE '^(extended|penelope|by|loaded|mode:|mode)$' || echo 0)
          SEED_TOTAL=$(echo "$SEED_TEXT" | wc -w | tr -d ' ')

          # Check for known BPE fragments
          BPE_FRAGS_PEN=$(echo "$PEN_WORDS" | tr ' ' '\n' | grep -cE '^(ough|ital|ard|ently|cre|ely|ary|ment|tion|ness|ling|ther|ble|ful|ous|ive|ent|ant|ist|ity|ght|est|ted|ting|ally)$' || echo 0)
          BPE_FRAGS_NJ=$(cat "$NJ" 2>/dev/null | tr ' ' '\n' | grep -cE '^(ough|ital|ard|ently|cre|ely|ary|ment|tion|ness|ling|ther|ble|ful|ous|ive|ent|ant|ist|ity|ght|est|ted|ting|ally)$' || echo 0)

          VOCAB_DIAG="${VOCAB_DIAG}
        **${DAY}:** Penelope ${PEN_DEBUG}/${PEN_TOTAL} debug leaks, ${BPE_FRAGS_PEN} BPE fragments | Seed ${SEED_DEBUG}/${SEED_TOTAL} debug leaks | NanoJanus ${BPE_FRAGS_NJ} BPE fragments"
        done

        # Save to file for the issue body (avoid shell escaping issues)
        cat > /tmp/issue_body.md << 'BODYEOF'
        ## Cascade 1 — Behavioral Report Request

        You are a field biologist observing a living digital ecosystem.
        Below is 3 days of cascade data. Read `.github/copilot-instructions.md` for full context.

        ### Your Task

        Analyze the last 3 days of organism behavior and write a behavioral report.

        **Write your report as a file:** `cascade/cascade1/reports/YYYY-MM-DD-behavioral.md`
        (Use today's date for the filename.)

        **Report structure:**

        1. **Executive Summary** (3-5 sentences: overall health, major findings)

        2. **Per-Organism Analysis**
           - Haiku: poetic quality, stop-word ratio, seed sensitivity
           - Penelope: chain coherence, word quality, BPE fragment count, debug leak count
           - Molequla: vitality (line counts, ecology writes), element balance
           - NanoJanus: bidirectional quality, BPE fragments, axis coherence

        3. **Vocabulary Health**
           - % real words vs BPE fragments vs debug leaks (per organism, per day)
           - Seed purity: % clean words in each seed
           - Trend: improving, stable, or degrading?

        4. **Cross-Organism Resonance**
           - Do themes flow between organisms?
           - Does the seed carry meaning or just noise?
           - Any emergent patterns across the 3-day window?

        5. **Anomalies & Beauty**
           - Anything unexpected, broken, or beautiful
           - Best single chain or haiku of the period
           - Worst single output and likely cause

        6. **Recommendations**
           - Specific, actionable suggestions (max 3)
           - What to watch in the next 3-day period

        ### Automated Vocabulary Diagnostics
        BODYEOF

        echo "$VOCAB_DIAG" >> /tmp/issue_body.md

        cat >> /tmp/issue_body.md << 'BODYEOF2'

        ### Raw Data (Last 3 Days)
        BODYEOF2

        echo "$REPORT_DATA" >> /tmp/issue_body.md

        cat >> /tmp/issue_body.md << 'BODYEOF3'

        ---

        **Important:**
        - Read `.github/copilot-instructions.md` for full organism documentation
        - Read `cascade/cascade1/CASCADE01.md` for architecture details
        - Your report should read like field notes, not a QA ticket
        - Note what is alive and working, not just what is broken
        - Create a PR with only the report file
        BODYEOF3

    - name: Create main issue and assign Copilot
      if: steps.collect.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TODAY=$(date -u +%Y-%m-%d)

        # === MAIN REPORT in ariannamethod/ariannamethod ===
        ISSUE_URL=$(gh issue create \
          --title "Behavioral Report: Cascade 1 — ${TODAY}" \
          --body-file /tmp/issue_body.md \
          --label "copilot" \
          2>&1)

        echo "Main issue created: $ISSUE_URL"
        ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
        if [ -n "$ISSUE_NUM" ]; then
          gh issue edit "$ISSUE_NUM" --add-assignee "copilot" 2>/dev/null || true
        fi

    - name: Create per-organism issues
      if: steps.collect.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        HAS_PAT: ${{ secrets.PAT_TOKEN != '' }}
      run: |
        if [ "$HAS_PAT" != "true" ]; then
          echo "PAT_TOKEN not configured — skipping cross-repo issues"
          exit 0
        fi

        TODAY=$(date -u +%Y-%m-%d)
        C1="cascade/cascade1"

        # Collect per-organism data for the 3-day window
        for i in 0 1 2; do
          DAY=$(date -u -d "$TODAY - $i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null)
          [ -z "$DAY" ] && continue

          # Haiku data
          HAIKU_DATA="${HAIKU_DATA}
        ### ${DAY}
        **Seed:** $(cat "$C1/seed/${DAY}.txt" 2>/dev/null | head -3 || echo '(missing)')
        **Output:**
        $(cat "$C1/haiku-lab/${DAY}.txt" 2>/dev/null || echo '(missing)')
        "

          # Penelope data
          PEN_DATA="${PEN_DATA}
        ### ${DAY}
        **Words:** $(cat "$C1/penelope-lab/${DAY}.txt" 2>/dev/null || echo '(missing)')
        **Raw chain (last 20 lines):**
        \`\`\`
        $(cat "$C1/penelope-lab/${DAY}_raw.txt" 2>/dev/null | tail -20 || echo '(missing)')
        \`\`\`
        "

          # Molequla data
          MOL_DATA="${MOL_DATA}
        ### ${DAY}
        $(if [ -d "$C1/molequla-lab/${DAY}" ]; then
          for elem in earth air water fire; do
            LOG="$C1/molequla-lab/${DAY}/${elem}.log"
            [ -f "$LOG" ] && echo "- **${elem}**: $(wc -l < "$LOG") lines | last ecology: $(grep 'ecology' "$LOG" | tail -1)"
          done
        else echo '(no data)'; fi)
        "

          # NanoJanus data
          NJ_DATA="${NJ_DATA}
        ### ${DAY}
        **Words:** $(cat "$C1/nanojanus-lab/${DAY}.txt" 2>/dev/null || echo '(missing)')
        **Raw chain (last 25 lines):**
        \`\`\`
        $(cat "$C1/nanojanus-lab/${DAY}_raw.txt" 2>/dev/null | tail -25 || echo '(missing)')
        \`\`\`
        "
        done

        # === HAIKU (ariannamethod/haiku.c) ===
        cat > /tmp/haiku_issue.md << HEOF
        ## Haiku Behavioral Report — ${TODAY}

        Analyze this organism's behavior over the last 3 days.
        Read \`.github/copilot-instructions.md\` for context.
        Write your report to \`labs/${TODAY}-behavioral.md\`.

        Focus on: poetic quality, stop-word ratio, seed sensitivity, syllable accuracy, emotional chamber dynamics.

        ### Data
        ${HAIKU_DATA}

        ---
        Create a PR with the report file only.
        HEOF

        gh issue create --repo ariannamethod/haiku.c \
          --title "Behavioral Report: Haiku — ${TODAY}" \
          --body-file /tmp/haiku_issue.md \
          --label "copilot" 2>&1 | tee /tmp/haiku_issue_url.txt
        H_NUM=$(cat /tmp/haiku_issue_url.txt | grep -oE '[0-9]+$')
        [ -n "$H_NUM" ] && gh issue edit "$H_NUM" --repo ariannamethod/haiku.c --add-assignee "copilot" 2>/dev/null || true

        # === PENELOPE (ariannamethod/1984) ===
        cat > /tmp/pen_issue.md << PEOF
        ## Penelope Behavioral Report — ${TODAY}

        Analyze this organism's behavior over the last 3 days.
        Read \`.github/copilot-instructions.md\` for context.
        Write your report to \`labs/${TODAY}-behavioral.md\`.

        Focus on: chain coherence, word quality, BPE fragment count, debug leak count, prophecy fulfillment, category distribution.

        ### Data
        ${PEN_DATA}

        ---
        Create a PR with the report file only.
        PEOF

        gh issue create --repo ariannamethod/1984 \
          --title "Behavioral Report: Penelope — ${TODAY}" \
          --body-file /tmp/pen_issue.md \
          --label "copilot" 2>&1 | tee /tmp/pen_issue_url.txt
        P_NUM=$(cat /tmp/pen_issue_url.txt | grep -oE '[0-9]+$')
        [ -n "$P_NUM" ] && gh issue edit "$P_NUM" --repo ariannamethod/1984 --add-assignee "copilot" 2>/dev/null || true

        # === MOLEQULA (ariannamethod/molequla) ===
        cat > /tmp/mol_issue.md << MEOF
        ## Molequla Behavioral Report — ${TODAY}

        Analyze this organism's behavior over the last 3 days.
        Read \`.github/copilot-instructions.md\` for context.
        Write your report to \`labs/${TODAY}-behavioral.md\`.

        Focus on: element vitality, ecology writes, line count balance, syntropy patterns, stagnation detection.

        ### Data
        ${MOL_DATA}

        ---
        Create a PR with the report file only.
        MEOF

        gh issue create --repo ariannamethod/molequla \
          --title "Behavioral Report: Molequla — ${TODAY}" \
          --body-file /tmp/mol_issue.md \
          --label "copilot" 2>&1 | tee /tmp/mol_issue_url.txt
        M_NUM=$(cat /tmp/mol_issue_url.txt | grep -oE '[0-9]+$')
        [ -n "$M_NUM" ] && gh issue edit "$M_NUM" --repo ariannamethod/molequla --add-assignee "copilot" 2>/dev/null || true

        # === NANOJANUS (ariannamethod/janus) ===
        cat > /tmp/nj_issue.md << NJEOF
        ## NanoJanus Behavioral Report — ${TODAY}

        Analyze this organism's behavior over the last 3 days.
        Read \`.github/copilot-instructions.md\` for context.
        Write your report to \`labs/${TODAY}-behavioral.md\`.

        Focus on: bidirectional axis quality, BPE fragments, drift/dissonance metrics, prophecy accuracy, calendar drift effects.

        ### Data
        ${NJ_DATA}

        ---
        Create a PR with the report file only.
        NJEOF

        gh issue create --repo ariannamethod/janus \
          --title "Behavioral Report: NanoJanus — ${TODAY}" \
          --body-file /tmp/nj_issue.md \
          --label "copilot" 2>&1 | tee /tmp/nj_issue_url.txt
        NJ_NUM=$(cat /tmp/nj_issue_url.txt | grep -oE '[0-9]+$')
        [ -n "$NJ_NUM" ] && gh issue edit "$NJ_NUM" --repo ariannamethod/janus --add-assignee "copilot" 2>/dev/null || true

        echo "=== Per-organism issues created ==="
